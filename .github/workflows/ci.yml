name: Wappify CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dashboard-checks:
    name: Dashboard Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./wappify-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./wappify-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js App
        run: npm run build

  backend-checks:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./wappify-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./wappify-backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Node.js App
        run: npm run build
